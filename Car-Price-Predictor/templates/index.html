<!DOCTYPE html>
<html>

<head>
<title>Car Price Predictor</title>

<style>

body{
    font-family: Arial;
    background-color: #f2f2f2;
}

.container{
    width: 400px;
    margin: 100px auto;
    padding: 25px;
    background: white;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
    text-align: center;
}

input{
    width: 90%;
    padding: 8px;
    margin: 5px;
}

button{
    padding: 10px 20px;
    background: blue;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover{
    background: darkblue;
}

</style>

</head>

<body>

<div class="container">

<h2>Car Price Predictor</h2>

<form action="/predict" method="post">

Year<br>
<input type="number" name="year" required>

<br><br>

Car Brand<br>
<input type="text" name="brand" placeholder="Type brand like Suzuki or BMW">

<br><br>

Present Price (in Lakhs)<br>
<input type="number" step="0.01" name="price" required>

<br><br>

Kilometers Driven<br>
<input type="number" name="kms" required>

<br><br>

Owner<br>
<input type="number" name="owner" required>

<br><br>

<button type="submit">Predict Price</button>

</form>
{%if prediction_text%}
<h3>{{ prediction_text }}</h3>
{%endif%}

</div>

</body>

</html>
